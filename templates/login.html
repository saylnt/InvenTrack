{% extends 'base.html' %}

{% block login_content %}
<div class="login-body">
    <div class="login-card glass-panel">
        <div style="font-size: 3rem; color: var(--primary-color); margin-bottom: 10px;">
            <i class="fa-solid fa-boxes-stacked"></i>
        </div>
        <h2>INVENTRACK</h2>
        <p>KHASH ELEKTRONIK</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="badge {{ category }}" style="margin-bottom: 20px;">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" value="khash.elektronik@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" value="admin123" required>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
