{% extends 'base.html' %}

{% block page_title %}Tambah Produk Baru{% endblock %}

{% block content %}
<div class="glass-panel" style="padding: 30px; max-width: 600px; margin: 0 auto; background: var(--card-bg);">
    <form method="POST">
        <div class="form-group">
            <label>Nama Produk</label>
            <input type="text" name="name" required>
        </div>
        
        <div class="form-group">
            <label>Kategori</label>
            <select name="category" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;" required>
                <option value="TV">TV</option>
                <option value="Kulkas">Kulkas</option>
                <option value="Mesin Cuci">Mesin Cuci</option>
                <option value="Kipas Angin">Kipas Angin</option>
            </select>
        </div>

        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <label>Stok Etalase</label>
                <input type="number" name="stock" min="0" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Stok Gudang</label>
                <input type="number" name="warehouse_stock" min="0" required>
            </div>
        </div>

        <div class="form-group">
            <label>Harga Barang (Rp)</label>
            <input type="number" name="price" min="0" required>
        </div>

        <div class="form-group">
            <label>Diskon (%)</label>
            <input type="number" name="discount" min="0" max="100" value="0">
        </div>

        <div class="form-group">
            <label>Deskripsi Produk</label>
            <textarea name="description" rows="3" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;"></textarea>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> Save Product</button>
            <a href="{{ url_for('inventory') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
